<!-- [ignoring loop detection] -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignalMaster v4.0 | Reverb Debugger</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
</head>
<body class="dark-theme">
    <div id="app">
        <!-- Incoming Chat Alert -->
        <div id="incoming-alert" class="glass-card hide">
            <div class="alert-content">
                <span class="alert-icon">🔔</span>
                <span id="alert-text">Incoming Chat Request!</span>
                <button id="btn-accept-now" class="btn btn-success">Accept Now</button>
                <button id="btn-ignore-alert" class="btn">Ignore</button>
            </div>
        </div>

        <header class="glass-card">
            <div class="brand">
                <span class="icon">🔮</span>
                <h1>SignalMaster <span>v4.0</span></h1>
            </div>
            <div class="auth-controls">
                <input type="text" id="auth-token" placeholder="Bearer Token..." class="input-glow">
                <input type="number" id="user-id" placeholder="User ID" class="input-glow small">
                <button id="btn-connect" class="btn btn-primary">Connect</button>
                <button id="btn-pulse" class="btn btn-success" disabled>Go Online</button>
            </div>
            <div class="connection-status">
                <span id="status-dot"></span>
                <span id="status-text">Disconnected</span>
            </div>
        </header>

        <main>
            <aside class="sidebar glass-card">
                <div class="sidebar-header">
                    <h3>Active Chats</h3>
                    <button id="btn-new-chat" title="Start new chat">+</button>
                </div>
                <div id="session-list" class="list-container"></div>
            </aside>

            <section class="chat-area glass-card">
                <div id="active-chat-header">
                    <div class="chat-info">
                        <h2 id="recipient-name">Select a Chat</h2>
                        <p id="typing-indicator"></p>
                    </div>
                    <div class="chat-actions">
                        <button id="btn-accept" class="btn btn-success hide">Accept</button>
                        <button id="btn-end" class="btn btn-danger hide">End</button>
                    </div>
                </div>
                <div id="message-container" class="messages"></div>
                <div class="input-area">
                    <input type="text" id="msg-input" placeholder="Type a message..." disabled>
                    <button id="btn-send" class="btn btn-primary" disabled>Send</button>
                </div>
            </section>

            <aside class="log-area glass-card">
                <div class="log-header">
                    <h3>WebSocket Logs</h3>
                    <button id="btn-clear-logs">Clear</button>
                </div>
                <div id="event-logs" class="log-container"></div>
            </aside>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
